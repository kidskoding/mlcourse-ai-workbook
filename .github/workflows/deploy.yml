name: Deploy workbook to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Export notebooks to WASM
        run: |
          set -euo pipefail
          for f in topic*/notes*.py topic*/assignment.py; do
            out="_site/${f%.py}"
            uv run marimo export html-wasm "$f" -o "$out" --mode edit
          done

      - name: Build index page
        run: uv run python scripts/build_index.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
